name: Release (Windows)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_SHARED_LIBS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Collect artifact metadata
        id: meta
        shell: pwsh
        run: |
          $cmake = Get-Content CMakeLists.txt -Raw
          $match = [regex]::Match($cmake, 'project\s*\(\s*QuickShiori\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)')
          if ($match.Success) {
            $version = $match.Groups[1].Value
          } else {
            $version = '0.0.0'
          }
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "short_sha=$shortSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package release zip
        shell: pwsh
        run: |
          $zipName = "quickshiori-windows-i386-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}.zip"
          $zipPath = Join-Path "build" $zipName
          $files = @(
            "build/dist/qjs.exe",
            "build/dist/qjs.dll",
            "build/dist/quickshiori.dll",
            "build/dist/quickshiori.pdb",
            "build/dist/quickjs_sqlite3.dll",
            "build/dist/quickjs_sqlite3.pdb",
            "build/dist/ukadll.dll",
            "build/dist/ukadll.pdb",
            "build/dist/winrtmc.dll",
            "build/dist/winrtmc.pdb"
          )
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $files -DestinationPath $zipPath

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quickshiori-windows-i386-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}.zip
          if-no-files-found: error
          path: build/quickshiori-windows-i386-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}.zip

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: QuickShiori v${{ steps.meta.outputs.version }}
          draft: false
          prerelease: true
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: build/quickshiori-windows-i386-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}.zip
          body: |
            Release of QuickShiori version ${{ steps.meta.outputs.version }} for Windows i386 architecture.

            Commit ID: ${{ steps.meta.outputs.short_sha }}
