name: CI (Windows)

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quickshiori-windows-i386
          if-no-files-found: error
          path: |
            build/dist/qjs.exe
            build/dist/qjs.dll
            build/dist/quickshiori.dll
            build/dist/quickshiori.pdb
            build/dist/quickjs_sqlite3.dll
            build/dist/quickjs_sqlite3.pdb
            build/dist/ukadll.dll
            build/dist/ukadll.pdb
            build/dist/winrtmc.dll
            build/dist/winrtmc.pdb
