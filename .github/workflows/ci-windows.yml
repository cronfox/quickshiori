name: CI (Windows)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure CMake
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Collect artifact metadata
        id: meta
        shell: pwsh
        run: |
          $cmake = Get-Content CMakeLists.txt -Raw
          $match = [regex]::Match($cmake, 'project\s*\(\s*QuickShiori\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)')
          if ($match.Success) {
            $version = $match.Groups[1].Value
          } else {
            $version = '0.0.0'
          }
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "short_sha=$shortSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quickshiori-windows-i386-v${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}
          if-no-files-found: error
          path: |
            build/dist/qjs.exe
            build/dist/qjs.dll
            build/dist/quickshiori.dll
            build/dist/quickshiori.pdb
            build/dist/quickjs_sqlite3.dll
            build/dist/quickjs_sqlite3.pdb
            build/dist/ukadll.dll
            build/dist/ukadll.pdb
            build/dist/winrtmc.dll
            build/dist/winrtmc.pdb
